services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: travelx
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # 호스트에 포트를 노출하지 않는다 — server 컨테이너는 컴포즈 내부 네트워크로 db:3306에 붙는다.
    # 호스트에 이미 로컬 MySQL(3306)이 떠 있는 경우가 많아 굳이 노출하면 충돌만 생긴다.
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build: .
    # opro 프로젝트(3000/8080/8000/8001/5432)와 로컬 MySQL(3306/33060)이 쓰는 포트를 피해 기본값을 8090으로 둔다.
    ports:
      - "${SERVER_HOST_PORT:-8090}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:mysql://db:3306/travelx
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:

openapi: 3.0.3

info:
  title: TravelX API
  version: 1.3.0
  description: |
    # TravelX — 스마트 환전 예약 플랫폼 API 명세서

    **PRD v1.3 기준** (FPT IS Internship Project)

    여행자가 환율을 비교하고, 원하는 통화를 예약한 뒤, 선택한 지점에서 수령하는
    온라인 환전 예약 플랫폼의 REST API 명세입니다.

    ## 인증
    - 사용자 인증은 **Google OAuth2 로그인만** 지원하며, 로그인 후 발급되는 **JWT**를
      `Authorization: Bearer {token}` 헤더로 전달합니다.
    - 역할(Role)은 `USER` / `ADMIN` 두 가지입니다. 지점 직원(Staff) 기능(우대율 설정, QR 검증)은
      MVP에서 `ADMIN` 권한으로 수행하며, 추후 `BRANCH` 역할 분리를 검토합니다.

    ## 공통 에러 응답
    모든 에러는 아래 형식으로 반환됩니다.
    ```json
    {
      "code": "TIME_SLOT_FULL",
      "message": "선택한 픽업 시간대의 예약 정원이 가득 찼습니다.",
      "timestamp": "2026-07-13T10:30:00Z"
    }
    ```

    | HTTP | code 예시 | 상황 |
    |------|-----------|------|
    | 400 | `VALIDATION_ERROR` | 요청 값 형식 오류 |
    | 400 | `AMOUNT_LIMIT_EXCEEDED` | USD 10,000 상당액 이상 예약 시도 (PRD §19.1, §21.2) |
    | 400 | `AMOUNT_BELOW_MINIMUM` | 최소 환전 금액(10,000 VND 상당) 미만 (PRD §19.1) |
    | 401 | `AUTH_INVALID_TOKEN` | JWT 누락/만료/위조 |
    | 403 | `FORBIDDEN_ROLE` | 권한 없는 리소스 접근 |
    | 403 | `PHONE_NOT_VERIFIED` | 휴대폰 미인증 상태로 예약 시도 (KYC 1단계, PRD §21.3) |
    | 403 | `NO_SHOW_LIMIT` | 노쇼 이력에 따른 예약 제한 (PRD §19.2) |
    | 404 | `RESOURCE_NOT_FOUND` | 존재하지 않는 리소스 |
    | 409 | `STOCK_EXCEEDED` | 예약 전용 재고 부족 (PRD §20.1) |
    | 409 | `TIME_SLOT_FULL` | 30분 슬롯 정원 초과 (PRD §19.3) |
    | 409 | `ALREADY_CANCELLED` / `ALREADY_COMPLETED` | 취소/완료된 예약에 대한 중복 처리 |
    | 409 | `QR_ALREADY_USED` / `QR_EXPIRED` / `IDENTITY_MISMATCH` | QR 검증 실패 (PRD §8 Cash Pickup) |

    ## 예약 정책 요약 (PRD §19)
    - 보증금 없음, 방문 전 무료 취소
    - 예약 시 재고 홀드 **2시간**, 만료 시 자동 해제
    - USD 10,000 상당액 이상 예약 불가, 최소 10,000 VND 상당액
    - 픽업 시간은 30분 슬롯 단위, 지점별 슬롯 정원(`timeSlotCapacity`) 초과 시 선택 불가
    - 최근 30일 내 노쇼 1회 → 동시 예약 1건 제한, 누적 3회 → 7일간 신규 예약 차단

servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버
  - url: https://api.travelx.example.com
    description: 운영 서버 (배포 후 확정)

tags:
  - name: Auth
    description: Google OAuth2 로그인, 로그아웃, 휴대폰 인증(KYC 1단계)
  - name: User
    description: 내 프로필 조회
  - name: Currency
    description: 통화/환율 조회, 환율 이력, AI 환전 타이밍 추천
  - name: Branch
    description: 지점 조회, AI 환전소 추천, 지점 우대율/재고 설정, QR 픽업 검증
  - name: Reservation
    description: 환전 예약 생성/조회/취소, 영수증 다운로드
  - name: Notification
    description: 인앱 알림 조회 및 읽음 처리
  - name: Admin
    description: 관리자 — 예약/환율/지점/대시보드 관리

paths:
  # ──────────────────────────── Auth ────────────────────────────
  /oauth2/authorization/google:
    get:
      tags: [Auth]
      operationId: initiateGoogleLogin
      summary: Google OAuth2 로그인 시작
      description: |
        Google 로그인 동의 화면으로 리다이렉트합니다. (Spring Security OAuth2 Client 표준 엔드포인트)
        프론트엔드는 이 URL로 브라우저를 이동시키기만 하면 됩니다.
      security: []
      responses:
        '302':
          description: Google 로그인 페이지로 리다이렉트
          headers:
            Location:
              schema:
                type: string
                example: https://accounts.google.com/o/oauth2/v2/auth?...

  /auth/google/callback:
    get:
      tags: [Auth]
      operationId: googleCallback
      summary: Google OAuth2 콜백 — JWT 발급
      description: |
        Google이 전달한 인가 코드를 검증하고, 최초 로그인 시 계정을 자동 생성(가입)하거나
        기존 사용자를 조회한 뒤 JWT를 발급합니다. (PRD §8 Sign In with Google)

        `isNewUser: true`인 경우 프론트엔드는 프로필 완성 화면(휴대폰 번호 입력 →
        `POST /auth/verify-phone`)으로 유도합니다. (PRD §24 Login/Register)
      security: []
      parameters:
        - name: code
          in: query
          required: true
          description: Google이 발급한 인가 코드
          schema:
            type: string
      responses:
        '200':
          description: 로그인 성공, JWT 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: 'AUTH_INVALID_TOKEN — Google 토큰 검증 실패'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 로그아웃
      description: 현재 JWT를 무효화(revoke)하고 세션을 종료합니다.
      responses:
        '204':
          description: 로그아웃 완료 (본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-phone:
    post:
      tags: [Auth]
      operationId: verifyPhone
      summary: 휴대폰 인증 코드 발송/확인 (KYC 1단계)
      description: |
        예약 단계 신원 확인(KYC 1단계, PRD §21.3)을 위한 휴대폰 인증입니다.
        `mode: REQUEST`로 인증 코드를 발송하고, `mode: CONFIRM`으로 코드를 검증합니다.
        인증 완료 전에는 예약 생성이 `403 PHONE_NOT_VERIFIED`로 거절됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationRequest'
      responses:
        '200':
          description: 코드 발송 성공 또는 인증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationResponse'
        '400':
          description: 'VALIDATION_ERROR — 잘못된 번호 형식 또는 인증 코드 불일치'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────── User ────────────────────────────
  /users/me:
    get:
      tags: [User]
      operationId: getMyProfile
      summary: 내 프로필 조회
      description: |
        이름/이메일은 Google 계정에서 가져온 값으로 **읽기 전용**입니다. (PRD §6.1 Profile)
      responses:
        '200':
          description: 내 프로필
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────── Currency ────────────────────────────
  /currencies:
    get:
      tags: [Currency]
      operationId: listCurrencies
      summary: 통화/환율 목록 조회 (통화 검색)
      description: |
        기준 환율(매일 외부 공공 API에서 배치 수집) 목록을 반환합니다.

        - `q`를 주면 통화 코드/국가명으로 검색합니다.
        - `q`가 없으면 전체 목록과 함께 **최근 검색 통화**(사용자별, 로그인 시)와
          **인기 통화**(전체 집계)를 함께 반환합니다. (PRD §8 Currency Search)
      security: []
      parameters:
        - name: q
          in: query
          required: false
          description: 통화 코드(USD, JPY 등) 또는 국가명 검색어
          schema:
            type: string
            example: USD
      responses:
        '200':
          description: 통화 목록 (+ 최근 검색/인기 통화)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'

  /currencies/{code}:
    get:
      tags: [Currency]
      operationId: getCurrency
      summary: 통화 상세 조회
      description: 특정 통화의 기준 매입/매도 환율과 변동성 배지 정보를 반환합니다.
      security: []
      parameters:
        - $ref: '#/components/parameters/CurrencyCode'
      responses:
        '200':
          description: 통화 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /currencies/{code}/history:
    get:
      tags: [Currency]
      operationId: getCurrencyHistory
      summary: 환율 이력 조회
      description: |
        일별 배치로 수집된 환율 이력(`ExchangeRateHistory`)을 반환합니다.
        차트 표시 및 AI 타이밍 추천의 입력 데이터로 사용됩니다. (PRD §9.2)
      security: []
      parameters:
        - $ref: '#/components/parameters/CurrencyCode'
        - name: days
          in: query
          required: false
          description: 조회할 최근 일수 (기본 30일)
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        '200':
          description: 환율 이력 목록 (날짜 오름차순)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RateHistoryEntry'
        '404':
          $ref: '#/components/responses/NotFound'

  /currencies/{code}/recommendation:
    get:
      tags: [Currency]
      operationId: getTimingRecommendation
      summary: AI 환전 타이밍 추천 조회
      description: |
        최근 N일 환율 이력으로 학습한 **선형 회귀 모델**의 익일 예측값과 현재 환율을 비교해
        `NOW`(지금 환전) / `WAIT`(대기) / `NEUTRAL`(중립) 신호를 반환합니다. (PRD §9)

        - **워밍업 정책**: 환율 이력이 14일 미만이면 `COLLECTING_DATA` 상태를 반환하고
          배지를 표시하지 않습니다. (PRD §9.4)
        - **폴백**: 모델 예측 실패 또는 입력 이상 시 이동평균±표준편차 룰 기반 로직으로
          자동 전환되며 `fallbackUsed: true`로 표시됩니다. (PRD §9.4)
        - 최근 변동폭이 임계값을 초과하면 `highVolatility: true` (고변동성 배지, PRD §9.6)
        - 응답에는 반드시 "투자 조언이 아님" 면책 문구가 포함됩니다. (PRD §9.6)
      security: []
      parameters:
        - $ref: '#/components/parameters/CurrencyCode'
      responses:
        '200':
          description: 타이밍 추천 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingRecommendation'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────── Branch ────────────────────────────
  /branches:
    get:
      tags: [Branch]
      operationId: listBranches
      summary: 지점 목록 조회 (환율 비교)
      description: |
        지점 목록을 반환합니다. `currency`를 주면 해당 통화의 지점별 최종 환율
        (기준 환율 × (1 − 우대율))을 포함해 환율 비교 목록으로 사용합니다. (PRD §8 Exchange Rate Comparison)
      security: []
      parameters:
        - name: currency
          in: query
          required: false
          description: 환율 비교 대상 통화 코드
          schema:
            type: string
            example: USD
        - name: latitude
          in: query
          required: false
          description: 사용자 위도 (거리 계산/정렬용, 선택)
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: false
          description: 사용자 경도
          schema:
            type: number
            format: double
        - name: sort
          in: query
          required: false
          description: '정렬 기준: 환율순 / 거리순'
          schema:
            type: string
            enum: [RATE, DISTANCE]
            default: RATE
      responses:
        '200':
          description: 지점 목록 (환율 비교 정보 포함)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BranchSummary'

  /branches/{id}:
    get:
      tags: [Branch]
      operationId: getBranch
      summary: 지점 상세 조회
      description: |
        주소, 영업시간(오늘 강조), 통화별 최종 환율, "주변 최저가" 배지, 지도 미리보기용
        좌표를 반환합니다. (PRD §24 Branch Detail)
      security: []
      parameters:
        - $ref: '#/components/parameters/BranchId'
      responses:
        '200':
          description: 지점 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /branches/recommend:
    get:
      tags: [Branch]
      operationId: recommendBranches
      summary: AI 환전소 추천 (근처 지점 랭킹)
      description: |
        거리/환율/재고/예약 가능성 4개 요소의 가중 합산 점수로 근처 환전소를 랭킹합니다. (PRD §18)

        ```
        total_score = w1·distance + w2·rate + w3·availability + w4·reservation
        (초기 가중치: 0.35 / 0.35 / 0.20 / 0.10 — 서비스 정책 값, 하드코딩 금지)
        ```
        `total_score` 내림차순 정렬, 동점 시 `distanceScore`가 타이브레이커.
        결과는 참고용 추천이며 최종 선택은 사용자에게 있습니다. (PRD §18.6 면책)
      security: []
      parameters:
        - name: latitude
          in: query
          required: true
          description: 사용자 현재 위도
          schema:
            type: number
            format: double
            example: 37.5665
        - name: longitude
          in: query
          required: true
          description: 사용자 현재 경도
          schema:
            type: number
            format: double
            example: 126.9780
        - name: currency
          in: query
          required: true
          description: 환전 희망 통화 코드
          schema:
            type: string
            example: USD
        - name: radius_km
          in: query
          required: false
          description: 검색 반경 (km)
          schema:
            type: number
            format: double
            default: 5
        - name: top_n
          in: query
          required: false
          description: 최대 반환 지점 수 (환율 상세 화면은 top_n=4 요청)
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 추천 점수 내림차순 지점 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchRecommendationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /branches/{id}/reservations/{reservationId}/redeem:
    post:
      tags: [Branch]
      operationId: redeemReservation
      summary: (지점 직원) QR 스캔 픽업 검증·완료 처리
      description: |
        직원이 사용자의 **일회용 QR**을 스캔해 예약을 검증하고 픽업을 완료합니다. (PRD §8 Cash Pickup)

        처리 순서:
        1. QR 페이로드 디코드 → 예약 조회
        2. 예약 상태가 `RESERVED`인지 확인
        3. 제시된 신분증과 예약자 일치 확인 (직원이 `idVerified: true`로 확정)
        4. **원자적으로** `RESERVED → COMPLETED` 전이, `pickedUpAt` 기록, QR 즉시 무효화 (재사용 거부)

        실패 사유는 만료(`QR_EXPIRED`) / 이미 사용됨(`QR_ALREADY_USED`) /
        신원 불일치(`IDENTITY_MISMATCH`)로 구분되어 직원 화면에 표시됩니다. (PRD §24 QR Scan)
      parameters:
        - $ref: '#/components/parameters/BranchId'
        - name: reservationId
          in: path
          required: true
          description: 예약 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemRequest'
      responses:
        '200':
          description: 픽업 완료 (`COMPLETED` 전이 성공)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedeemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 'QR_EXPIRED / QR_ALREADY_USED / IDENTITY_MISMATCH / ALREADY_COMPLETED'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────── Reservation ────────────────────────────
  /reservations:
    post:
      tags: [Reservation]
      operationId: createReservation
      summary: 환전 예약 생성
      description: |
        통화·금액·지점·픽업 일시로 예약을 생성합니다. (PRD §8 Reservation)

        검증 순서:
        1. 휴대폰 인증 여부 (`403 PHONE_NOT_VERIFIED`)
        2. 노쇼 제한 — 최근 30일 노쇼 1회 시 동시 예약 1건 제한, 누적 3회 시 7일 차단 (`403 NO_SHOW_LIMIT`)
        3. 금액 한도 — USD 10,000 상당액 이상 차단(`400 AMOUNT_LIMIT_EXCEEDED`),
           10,000 VND 상당액 미만 차단(`400 AMOUNT_BELOW_MINIMUM`)
        4. 예약 전용 재고 확인 (`409 STOCK_EXCEEDED`) — 트랜잭션/락으로 동시 예약 초과 판매 방지 (PRD §10)
        5. 30분 픽업 슬롯 정원 확인 (`409 TIME_SLOT_FULL`)

        성공 시 **현재 환율을 고정(lockedRate)**하고 재고를 **2시간 홀드**합니다.
        만료 시 재고는 자동으로 워크인 재고로 반환됩니다. (PRD §19.1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationCreateRequest'
      responses:
        '201':
          description: 예약 생성 완료 (환율·통화 확보, 예약 완료 알림 발송)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
        '400':
          description: 'AMOUNT_LIMIT_EXCEEDED / AMOUNT_BELOW_MINIMUM / VALIDATION_ERROR'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 'PHONE_NOT_VERIFIED / NO_SHOW_LIMIT'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 'STOCK_EXCEEDED / TIME_SLOT_FULL'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Reservation]
      operationId: listMyReservations
      summary: 내 예약 목록 조회
      description: |
        내 예약을 상태별로 필터링해 조회합니다. UI 라벨 매핑: `RESERVED` → "Upcoming",
        `COMPLETED` → "Completed", `CANCELLED` → "Cancelled". (PRD §12 ReservationStatus)
        환전 내역 화면(Exchange History)은 `status=COMPLETED,CANCELLED`로 조회합니다.
      parameters:
        - name: status
          in: query
          required: false
          description: 예약 상태 필터 (쉼표로 복수 지정 가능)
          schema:
            type: string
            example: RESERVED
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 내 예약 목록 (최신순)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reservations/{id}:
    get:
      tags: [Reservation]
      operationId: getReservation
      summary: 예약 상세 조회 (QR 포함)
      description: |
        예약 상세를 반환합니다. `RESERVED` 상태일 때만 일회용 QR 페이로드(`qrPayload`)가
        포함되며, 완료/취소된 예약에서는 `null`입니다. (PRD §24 Reservation Detail)
        확정 금액은 예약 시점에 고정된 `lockedRate`로 계산됩니다.
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200':
          description: 예약 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 'FORBIDDEN_ROLE — 본인 예약이 아님'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Reservation]
      operationId: cancelReservation
      summary: 예약 취소
      description: |
        본인 예약을 취소하고 홀드된 재고를 복원합니다. 방문 전 취소는 무료입니다. (PRD §19.1)
        클라이언트는 취소 확정 전 반드시 확인 모달을 표시해야 합니다. (PRD §6.1)
        취소 완료 시 취소 알림이 발송됩니다.
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '204':
          description: 취소 완료 (재고 복원, 본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 'FORBIDDEN_ROLE — 본인 예약이 아님'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 'ALREADY_CANCELLED / ALREADY_COMPLETED — 취소 불가 상태'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservations/{id}/receipt:
    get:
      tags: [Reservation]
      operationId: downloadReceipt
      summary: 영수증 다운로드 (완료 예약 전용)
      description: |
        `COMPLETED` 상태의 예약에 대해 예약+지점+고정 환율 데이터로 생성한 영수증 파일을
        반환합니다. (PRD §8 Download Receipt)
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200':
          description: 영수증 PDF 파일
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 'FORBIDDEN_ROLE — 본인 예약이 아님'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 'RECEIPT_NOT_AVAILABLE — COMPLETED 상태가 아님'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────── Notification ────────────────────────────
  /notifications:
    get:
      tags: [Notification]
      operationId: listNotifications
      summary: 내 알림 목록 조회
      description: |
        예약 완료 / 예약 취소 / 픽업 리마인더 알림을 최신순으로 반환합니다. (PRD §6.1 Notifications)
        픽업 리마인더는 배치 잡(Spring Scheduler)이 생성합니다.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 알림 목록 (최신순)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/read:
    patch:
      tags: [Notification]
      operationId: markNotificationsRead
      summary: 알림 읽음 처리
      description: |
        지정한 알림들 또는 전체 알림을 읽음 처리합니다. (PRD §24 "mark-all-as-read")
        `notificationIds`를 생략하고 `all: true`를 보내면 전체 읽음 처리됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationReadRequest'
      responses:
        '200':
          description: 읽음 처리된 알림 수
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedCount:
                    type: integer
                    example: 3
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────── Admin ────────────────────────────
  /admin/reservations:
    get:
      tags: [Admin]
      operationId: adminListReservations
      summary: (관리자) 전체 예약 조회
      description: |
        전 지점 예약을 검색/필터링합니다. 관리자 예약 화면의 상태 탭
        (ALL / Completed / Cancelled / Pending)에 대응합니다. (PRD §24 Reservations)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ReservationStatus'
        - name: branchId
          in: query
          required: false
          description: 지점 필터
          schema:
            type: integer
            format: int64
        - name: q
          in: query
          required: false
          description: 예약번호/고객명 검색어
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 예약 목록 (고객 정보 포함)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminReservationPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/rates:
    patch:
      tags: [Admin]
      operationId: adminUpdateRates
      summary: (관리자) 기준 환율 수정
      description: |
        통화별 기준 매입/매도 환율을 수동 수정합니다. (PRD §8 Rate Management)
        평시에는 일 배치가 외부 공공 API에서 자동 갱신하며, 이 API는 검증·보정용입니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RateUpdateRequest'
      responses:
        '200':
          description: 갱신된 통화 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CurrencyDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/dashboard:
    get:
      tags: [Admin]
      operationId: adminDashboard
      summary: (관리자) 통계 대시보드 조회
      description: |
        오늘 방문 사용자 수, 대기 중 예약 수, 통화별 거래량 랭킹, 최근 확정 예약 목록을
        반환합니다. (PRD §6.2, §24 Admin Dashboard)
      parameters:
        - name: from
          in: query
          required: false
          description: 집계 시작일 (기본 오늘)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: 집계 종료일 (기본 오늘)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 대시보드 통계
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/branches:
    post:
      tags: [Admin]
      operationId: adminCreateBranch
      summary: (관리자) 신규 지점 등록
      description: |
        지점명, 주소, 좌표, 영업시간, 연락처, 취급 통화, 30분 슬롯 정원을 등록합니다. (PRD §6.2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchCreateRequest'
      responses:
        '201':
          description: 지점 등록 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/branches/{id}:
    patch:
      tags: [Admin]
      operationId: adminUpdateBranch
      summary: (관리자) 지점 수정 / 비활성화
      description: |
        지점 정보를 부분 수정합니다. `active: false`로 지점을 비활성화(노출 중단)할 수 있습니다.
        (PRD §6.2 Edit / deactivate branch)
      parameters:
        - $ref: '#/components/parameters/BranchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchUpdateRequest'
      responses:
        '200':
          description: 지점 수정 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/branches/{id}/rate:
    patch:
      tags: [Admin]
      operationId: adminUpdateBranchRate
      summary: (지점) 우대율·예약 전용 재고 설정
      description: |
        지점이 매일 아침 관리자 페이지에서 통화별 **우대율(%)**과 **예약 전용 재고**를
        설정합니다. (PRD §8, §20.1)

        - 우대율은 즉시 반영: 최종 환율 = 기준 환율 × (1 − preferentialRate)
        - 예약 전용 재고는 워크인 재고와 분리되며, 앱 예약은 이 수량에서만 차감됩니다.
          소진 시 해당 지점/통화는 "당일 예약 마감"으로 표시됩니다(정상 상태).
      parameters:
        - $ref: '#/components/parameters/BranchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchRateUpdateRequest'
      responses:
        '200':
          description: 우대율/재고 반영 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchCurrencyRate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ════════════════════════════ Components ════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Google OAuth2 로그인 후 발급된 JWT

  parameters:
    CurrencyCode:
      name: code
      in: path
      required: true
      description: ISO 4217 통화 코드
      schema:
        type: string
        example: USD
    BranchId:
      name: id
      in: path
      required: true
      description: 지점 ID
      schema:
        type: integer
        format: int64
    ReservationId:
      name: id
      in: path
      required: true
      description: 예약 ID
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      required: false
      description: 페이지 번호 (0부터 시작)
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      required: false
      description: 페이지 크기
      schema:
        type: integer
        default: 20

  responses:
    BadRequest:
      description: 'VALIDATION_ERROR — 요청 값 형식/범위 오류'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 'AUTH_INVALID_TOKEN — JWT 누락/만료/위조'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 'FORBIDDEN_ROLE — 접근 권한 없음'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 'RESOURCE_NOT_FOUND — 리소스 없음'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ---------- 공통 ----------
    ErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          description: 도메인 에러 코드 (info의 공통 에러 표 참조)
          example: TIME_SLOT_FULL
        message:
          type: string
          example: 선택한 픽업 시간대의 예약 정원이 가득 찼습니다.
        timestamp:
          type: string
          format: date-time

    # ---------- Auth / User ----------
    AuthTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: API 호출에 사용할 JWT
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: 토큰 유효 기간 (초)
          example: 3600
        isNewUser:
          type: boolean
          description: 최초 로그인(자동 가입) 여부 — true면 프로필 완성 화면으로 유도
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 이름 (Google 프로필, 읽기 전용)
          example: 유지훈
        email:
          type: string
          format: email
          description: 이메일 (Google 프로필, 읽기 전용)
        phone:
          type: string
          nullable: true
          description: 휴대폰 번호 (KYC 인증 완료 시 저장)
          example: '010-1234-5678'
        phoneVerified:
          type: boolean
          description: 휴대폰 인증(KYC 1단계) 완료 여부
        role:
          type: string
          enum: [USER, ADMIN]

    PhoneVerificationRequest:
      type: object
      required: [phone, mode]
      properties:
        phone:
          type: string
          example: '010-1234-5678'
        mode:
          type: string
          enum: [REQUEST, CONFIRM]
          description: REQUEST = 인증 코드 발송, CONFIRM = 코드 검증
        code:
          type: string
          nullable: true
          description: mode가 CONFIRM일 때 필수
          example: '482913'

    PhoneVerificationResponse:
      type: object
      properties:
        verified:
          type: boolean
          description: CONFIRM 성공 시 true (REQUEST 응답에서는 false)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: 발송된 인증 코드 만료 시각 (REQUEST 응답에만 포함)

    # ---------- Currency ----------
    CurrencySummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          example: USD
        country:
          type: string
          example: 미국
        buyRate:
          type: number
          format: double
          description: 기준 매입 환율 (외부 공공 API, 일 1회 갱신)
          example: 1391.5
        sellRate:
          type: number
          format: double
          description: 기준 매도 환율
          example: 1419.2
        updatedAt:
          type: string
          format: date-time
          description: 기준 환율 갱신 시각

    CurrencyListResponse:
      type: object
      properties:
        results:
          type: array
          description: 검색 결과 또는 전체 통화 목록
          items:
            $ref: '#/components/schemas/CurrencySummary'
        recentSearches:
          type: array
          nullable: true
          description: 최근 검색 통화 (로그인 + q 미입력 시에만, 없으면 빈 배열)
          items:
            $ref: '#/components/schemas/CurrencySummary'
        popularCurrencies:
          type: array
          nullable: true
          description: 인기 통화 (전체 사용자 집계, q 미입력 시에만)
          items:
            $ref: '#/components/schemas/CurrencySummary'

    CurrencyDetail:
      allOf:
        - $ref: '#/components/schemas/CurrencySummary'
        - type: object
          properties:
            highVolatility:
              type: boolean
              description: 최근 변동폭이 임계값 초과 시 true (고변동성 배지, PRD §9.6)

    RateHistoryEntry:
      type: object
      properties:
        date:
          type: string
          format: date
          example: '2026-07-12'
        rate:
          type: number
          format: double
          example: 1388.7

    TimingRecommendation:
      type: object
      required: [signal, disclaimer]
      properties:
        currencyCode:
          type: string
          example: USD
        signal:
          type: string
          enum: [NOW, WAIT, NEUTRAL, COLLECTING_DATA]
          description: |
            NOW = 지금 환전 / WAIT = 대기 / NEUTRAL = 중립.
            COLLECTING_DATA = 이력 14일 미만 워밍업 상태(배지 미표시). (PRD §9.4)
        currentRate:
          type: number
          format: double
          example: 1391.5
        predictedRate:
          type: number
          format: double
          nullable: true
          description: 선형 회귀 모델의 익일 예측 환율 (COLLECTING_DATA면 null)
          example: 1397.1
        highVolatility:
          type: boolean
          description: 고변동성 배지 여부 (PRD §9.6)
        fallbackUsed:
          type: boolean
          description: 모델 실패로 이동평균±표준편차 룰 기반 폴백이 사용됐는지 (PRD §9.4)
        explanation:
          type: array
          description: 회귀 계수 기반 신호 근거 (어떤 피처가 얼마나 기여했는지, PRD §9.3)
          items:
            type: object
            properties:
              feature:
                type: string
                example: 7일 이동평균
              contribution:
                type: number
                format: double
                example: 0.62
        disclaimer:
          type: string
          example: 본 추천은 투자 조언이 아니며 참고용으로만 제공됩니다.

    # ---------- Branch ----------
    BranchSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: 명동 환전센터
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        distanceKm:
          type: number
          format: double
          nullable: true
          description: 사용자 위치 기준 거리 (위치 파라미터 전달 시에만)
        isOpenNow:
          type: boolean
        finalRate:
          type: number
          format: double
          nullable: true
          description: 기준 환율 × (1 − 우대율). currency 파라미터 전달 시에만
          example: 1384.3
        preferentialRate:
          type: number
          format: double
          nullable: true
          description: 지점 우대율 (%)
          example: 0.5
        reservationAvailable:
          type: boolean
          description: 예약 전용 재고 잔여 여부 (소진 시 false = 당일 예약 마감)

    BranchDetail:
      allOf:
        - $ref: '#/components/schemas/BranchSummary'
        - type: object
          properties:
            phone:
              type: string
              example: '02-123-4567'
            businessHours:
              type: string
              description: 영업시간 (오늘 요일 강조는 프론트 처리)
              example: '평일 09:00-18:00, 토 09:00-13:00'
            pickupLocationDetail:
              type: string
              description: 지점 내 상세 수령 위치 (층/부스 등 자유 텍스트)
              example: 1층 3번 부스
            timeSlotCapacity:
              type: integer
              description: 30분 픽업 슬롯당 최대 동시 예약 수 (PRD §12, §19.3)
              example: 4
            isBestRateNearby:
              type: boolean
              description: 주변 지점 중 최저 매도 환율이면 true (PRD §18.2)
            active:
              type: boolean
              description: 비활성화된 지점은 목록/추천에서 제외
            currencies:
              type: array
              description: 취급 통화별 우대율·최종 환율·예약 가능 여부
              items:
                $ref: '#/components/schemas/BranchCurrencyRate'

    BranchCurrencyRate:
      type: object
      properties:
        currencyCode:
          type: string
          example: USD
        preferentialRate:
          type: number
          format: double
          description: 우대율 (%) — 지점이 설정, 즉시 반영
          example: 0.5
        finalRate:
          type: number
          format: double
          description: 기준 환율 × (1 − preferentialRate)
          example: 1384.3
        reservationOnlyStock:
          type: number
          format: double
          description: 앱 예약 전용 잔여 재고 (워크인 재고와 분리, PRD §20.1)
          example: 2000
        updatedAt:
          type: string
          format: date-time

    BranchRateUpdateRequest:
      type: object
      required: [currencyCode]
      properties:
        currencyCode:
          type: string
          example: USD
        preferentialRate:
          type: number
          format: double
          description: 우대율 (%)
          example: 0.5
        reservationOnlyStock:
          type: number
          format: double
          description: 오늘 앱 예약에 노출할 전용 재고 수량
          example: 2000

    BranchRecommendationResponse:
      type: object
      properties:
        results:
          type: array
          description: total_score 내림차순 (동점 시 distanceScore 우선)
          items:
            $ref: '#/components/schemas/BranchRecommendation'
        disclaimer:
          type: string
          example: 본 추천은 투자·금융 조언이 아니며 참고용으로만 제공됩니다.

    BranchRecommendation:
      allOf:
        - $ref: '#/components/schemas/BranchSummary'
        - type: object
          properties:
            totalScore:
              type: number
              format: double
              minimum: 0
              maximum: 1
              description: 최종 추천 점수 (0–1, PRD §18.2)
              example: 0.82
            breakdown:
              $ref: '#/components/schemas/ScoreBreakdown'
            isBestRateNearby:
              type: boolean
              description: 주변 최저 매도 환율 여부 (totalScore와 무관한 독립 플래그)

    ScoreBreakdown:
      type: object
      description: 요소별 기여 점수 (가중치 w1=0.35 거리, w2=0.35 환율, w3=0.20 재고, w4=0.10 예약)
      properties:
        distanceScore:
          type: number
          format: double
          example: 0.9
        rateScore:
          type: number
          format: double
          example: 0.85
        availabilityScore:
          type: number
          format: double
          example: 0.7
        reservationScore:
          type: number
          format: double
          example: 0.6

    BranchCreateRequest:
      type: object
      required: [name, address, latitude, longitude, businessHours, phone, timeSlotCapacity]
      properties:
        name:
          type: string
          example: 명동 환전센터
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        phone:
          type: string
        businessHours:
          type: string
          example: '평일 09:00-18:00, 토 09:00-13:00'
        pickupLocationDetail:
          type: string
          nullable: true
        timeSlotCapacity:
          type: integer
          description: 30분 슬롯당 최대 동시 예약 수
          example: 4
        supportedCurrencies:
          type: array
          description: 취급 통화 코드 목록
          items:
            type: string
          example: [USD, JPY, EUR]

    BranchUpdateRequest:
      type: object
      description: 부분 수정 — 전달된 필드만 갱신
      properties:
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        phone:
          type: string
        businessHours:
          type: string
        pickupLocationDetail:
          type: string
        timeSlotCapacity:
          type: integer
        supportedCurrencies:
          type: array
          items:
            type: string
        active:
          type: boolean
          description: false로 설정 시 지점 비활성화 (노출 중단)

    RedeemRequest:
      type: object
      required: [qrToken, idVerified]
      properties:
        qrToken:
          type: string
          description: 사용자 QR에서 디코드한 일회용 토큰
        idVerified:
          type: boolean
          description: 직원이 신분증과 예약자 일치를 확인했는지 (false면 IDENTITY_MISMATCH 처리)

    RedeemResponse:
      type: object
      properties:
        reservationId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/ReservationStatus'
        pickedUpAt:
          type: string
          format: date-time
          description: 픽업 완료 시각 (QR은 이 시점에 즉시 무효화)
        summary:
          $ref: '#/components/schemas/ReservationDetail'

    # ---------- Reservation ----------
    ReservationStatus:
      type: string
      enum: [RESERVED, COMPLETED, CANCELLED]
      description: 'UI 라벨: RESERVED=Upcoming, COMPLETED=Completed, CANCELLED=Cancelled'

    ReservationCreateRequest:
      type: object
      required: [currencyCode, branchId, amount, pickupDate, pickupTime]
      properties:
        currencyCode:
          type: string
          example: USD
        branchId:
          type: integer
          format: int64
        amount:
          type: number
          format: double
          description: 환전 금액 (외화 기준). USD 10,000 상당액 미만, 10,000 VND 상당액 이상
          example: 500
        pickupDate:
          type: string
          format: date
          example: '2026-07-15'
        pickupTime:
          type: string
          description: 30분 슬롯 시작 시각 (HH:mm)
          example: '10:30'

    ReservationSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        reservationNumber:
          type: string
          description: 예약 확인용 번호
          example: TX-20260713-0042
        currencyCode:
          type: string
          example: USD
        amount:
          type: number
          format: double
          example: 500
        branchId:
          type: integer
          format: int64
        branchName:
          type: string
          example: 명동 환전센터
        pickupDate:
          type: string
          format: date
        pickupTime:
          type: string
          example: '10:30'
        status:
          $ref: '#/components/schemas/ReservationStatus'
        lockedRate:
          type: number
          format: double
          description: 예약 시점에 고정된 환율 (확정 금액 계산 기준, PRD §12)
          example: 1384.3
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: 재고 홀드 만료 시각 = 예약 시각 + 2시간 (RESERVED 상태에만, PRD §19.1)
        createdAt:
          type: string
          format: date-time

    ReservationDetail:
      allOf:
        - $ref: '#/components/schemas/ReservationSummary'
        - type: object
          properties:
            amountFrom:
              type: number
              format: double
              description: 지불 금액 (KRW) = amount × lockedRate
              example: 692150
            amountTo:
              type: number
              format: double
              description: 수령 외화 금액
              example: 500
            qrPayload:
              type: string
              nullable: true
              description: 일회용 QR 페이로드 — RESERVED 상태에만 포함, 사용 즉시 무효화
            pickedUpAt:
              type: string
              format: date-time
              nullable: true
              description: 직원 QR 검증으로 픽업 완료된 시각
            branch:
              $ref: '#/components/schemas/BranchSummary'

    ReservationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ReservationSummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    AdminReservationPage:
      type: object
      properties:
        content:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/ReservationSummary'
              - type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/UserProfile'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    # ---------- Notification ----------
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [RESERVATION_COMPLETED, RESERVATION_CANCELLED, PICKUP_REMINDER]
          description: 예약 완료 / 예약 취소 / 픽업 리마인더 (PRD §6.1)
        message:
          type: string
          example: 'USD 500 예약이 완료되었습니다. 명동 환전센터, 7/15 10:30 픽업'
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        unreadCount:
          type: integer
          description: 안 읽은 알림 수 (배지 표시용)
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64

    NotificationReadRequest:
      type: object
      properties:
        notificationIds:
          type: array
          nullable: true
          description: 읽음 처리할 알림 ID 목록 (all=true면 생략)
          items:
            type: integer
            format: int64
        all:
          type: boolean
          default: false
          description: true면 내 알림 전체 읽음 처리

    # ---------- Admin ----------
    RateUpdateRequest:
      type: object
      required: [currencyCode]
      properties:
        currencyCode:
          type: string
          example: USD
        buyRate:
          type: number
          format: double
          example: 1391.5
        sellRate:
          type: number
          format: double
          example: 1419.2

    DashboardResponse:
      type: object
      properties:
        todayUsers:
          type: integer
          description: 오늘 방문(활성) 사용자 수
          example: 128
        pendingReservations:
          type: integer
          description: 대기(RESERVED) 상태 예약 수
          example: 17
        popularCurrencies:
          type: array
          description: 거래량 기준 통화 랭킹
          items:
            type: object
            properties:
              currencyCode:
                type: string
                example: USD
              reservationCount:
                type: integer
                example: 42
              totalAmount:
                type: number
                format: double
                example: 21000
        recentReservations:
          type: array
          description: 최근 확정 예약 목록
          items:
            $ref: '#/components/schemas/ReservationSummary'

security:
  - bearerAuth: []

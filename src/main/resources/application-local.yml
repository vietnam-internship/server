server:
  port: 53080

spring:
  ai:
    openai:
      api-key: local-placeholder
  datasource:
    url: jdbc:mysql://localhost:53306/comit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true
  flyway:
    locations:
      - classpath:db/migration
      - classpath:db/seed

logging:
  file:
    name: ./logs/app-local.log
  level:
    org.hibernate.SQL: TRACE
    org.hibernate.orm.jdbc.bind: TRACE

comit:
  dev:
    auth:
      enabled: true
  auth:
    bridge:
      enabled: true
    sso:
      enabled: false
      frontend-success-url: http://localhost:5173
      frontend-error-url: http://localhost:5173/error
      cookie-secure: false
  load-test:
    enabled: ${COMIT_LOAD_TEST_ENABLED:false}
